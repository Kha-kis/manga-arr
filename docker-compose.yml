services:
  mangarr:
    image: ghcr.io/kha-kis/manga-arr:latest
    container_name: mangarr

    # Match this UID:GID to the owner of ./config and ./data on the host.
    user: "1000:1000"
    environment:
      TZ: Etc/UTC
      MANGA_SAVE_PATH: /data/media/manga
      MANGA_TORRENT_PATH: /data/torrents/manga
      MANGA_CATEGORY: manga
      RSS_INTERVAL: "900"
    volumes:
      - ./config:/config
      - ./data:/data
    ports:
      - "6789:8000"
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
