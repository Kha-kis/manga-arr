# Security scanning — temporarily manual-only while GitHub Actions billing is blocked.
#
# Three independent jobs:
#   - trivy-fs      filesystem scan (requirements.txt CVEs, Dockerfile
#                   misconfigurations). Honors .trivyignore.
#   - trivy-image   build the image, scan its OS packages + Python deps
#                   for CVEs. Honors .trivyignore.
#   - gitleaks      scan git history + working tree for committed secrets.
#
# Failure policy
#   trivy:    INFORMATIONAL ONLY at the moment. Findings print to the
#             job log for visibility but the steps don't fail the
#             build. Once GitHub Code Scanning is enabled on this
#             repo (Settings → Code security → Code scanning), flip
#             exit-code back to "1" + restore SARIF upload to surface
#             findings on the Security tab and gate merges on
#             HIGH/CRITICAL with a fix available.
#   gitleaks: fail on any leak. .gitleaks.toml allowlists the
#             test-only Fernet key in docker-compose.test.yml.
#
# Why Trivy is non-gating today: the action's bundled vuln DB sources
# (Trivy DB + GHSA + NVD) sometimes flag CVEs that the upstream Trivy
# CLI run locally doesn't reproduce, making "fix this finding" not
# always actionable from a developer's machine. Until findings are
# both reproducible and Code Scanning is wired up, gating creates
# noise without a remediation path.

name: Security

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read   # gitleaks-action enumerates PR commits

jobs:
  changes:
    name: Change classifier
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changes.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v7
        if: github.event_name != 'schedule'
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          docs_only=false

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              base="$(git rev-list --max-parents=0 "$head")"
            fi
          else
            base=""
            head=""
          fi

          if [[ -n "$base" && -n "$head" ]]; then
            git diff --name-only "$base" "$head" > /tmp/changed-files.txt
            if [[ -s /tmp/changed-files.txt ]]; then
              docs_only=true
              while IFS= read -r path; do
                case "$path" in
                  docs/*|*.md|*.MD) ;;
                  *) docs_only=false ;;
                esac
              done < /tmp/changed-files.txt
            fi
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          cat /tmp/changed-files.txt 2>/dev/null || true
          echo "docs_only=$docs_only"

  # ── Trivy filesystem scan ──────────────────────────────────────────
  trivy-fs:
    name: Trivy filesystem (deps + IaC)
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v7
        if: needs.changes.outputs.docs_only != 'true'

      - name: Skip Trivy fs scan for docs-only change
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Only docs/markdown files changed; skipping filesystem scan."

      - name: Trivy fs scan
        if: needs.changes.outputs.docs_only != 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # ignore-unfixed=true skips findings whose Fixed Version is
          # empty — upstream Debian / PyPA hasn't shipped a fix yet,
          # so blocking merges on those would just produce noise.
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          # exit-code: "0" — informational. See file header for why.
          exit-code: "0"
          format: table
          skip-dirs: tests/node_modules,tests/.playwright-browsers,.test-config

  # ── Trivy image scan ───────────────────────────────────────────────
  trivy-image:
    name: Trivy image (base + python pkgs)
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v7
        if: needs.changes.outputs.docs_only != 'true'

      - name: Skip Trivy image scan for docs-only change
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Only docs/markdown files changed; skipping image build and scan."

      - name: Build image
        if: needs.changes.outputs.docs_only != 'true'
        run: docker build -t mangarr:${{ github.run_id }} .

      - name: Trivy image scan
        if: needs.changes.outputs.docs_only != 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: mangarr:${{ github.run_id }}
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table

  # ── Semgrep SAST ───────────────────────────────────────────────────
  # CodeQL would be the gold-standard SAST scanner here, but Code Scanning
  # / SARIF upload requires GitHub Advanced Security on private repos
  # (paid). Semgrep CE is OSS, has comparable Python coverage for the
  # OWASP-Top-10 categories Mangarr cares about (SQLi, XSS, path
  # traversal, hardcoded secrets, deserialization, XXE), and runs without
  # any GHAS dependency.
  #
  # Failure policy: gates on ERROR-severity rules. WARNING-severity
  # findings print to the job log for triage but don't block merges —
  # most warnings here flag patterns that need human review (open
  # redirect via reflected URLs, template attribute interpolation) and
  # locking gating to those creates noise without helping.
  #
  # Triaged false positives stay in source via inline `# nosemgrep`
  # markers (with rationale comments) rather than path-based ignores.
  # .semgrepignore handles vendored/generated paths only.
  semgrep:
    name: Semgrep (Python SAST)
    runs-on: ubuntu-latest
    needs: changes
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v7
        if: needs.changes.outputs.docs_only != 'true'

      - name: Skip Semgrep for docs-only change
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Only docs/markdown files changed; skipping Semgrep scans."

      - name: Semgrep scan (ERROR-severity gating)
        if: needs.changes.outputs.docs_only != 'true'
        # Uses `semgrep scan` (not `semgrep ci`) so we can pass the
        # severity + error flags directly. `semgrep ci` is the higher-
        # level wrapper but its CLI surface doesn't accept --severity
        # or --error — those are scan-only flags.
        run: |
          semgrep scan \
            --config=p/python \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/fastapi \
            --severity=ERROR \
            --error \
            --metrics=off

      - name: Semgrep informational scan (all severities)
        # Always runs, even if the gating step above failed, so the job
        # log shows the full landscape (WARNING + INFO findings) for
        # triage. Doesn't gate on its own.
        if: always() && needs.changes.outputs.docs_only != 'true'
        run: |
          semgrep scan \
            --config=p/python \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/fastapi \
            --metrics=off \
            --no-error || true

  # ── Gitleaks secret scan ───────────────────────────────────────────
  gitleaks:
    name: Gitleaks (committed secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Gitleaks needs full history to scan every commit, not just
          # the diff.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
